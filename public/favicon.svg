<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="50%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- 光泽层 -->
  <rect width="512" height="256" rx="108" fill="url(#shine)" opacity="0.4"/>
  <!-- ChatGPT 标志性六边形花瓣图案 -->
  <g transform="translate(256,220)" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0,-90 L78,-45 L78,45 L0,90 L-78,45 L-78,-45 Z" opacity="0.95"/>
    <line x1="0" y1="-90" x2="0" y2="90" opacity="0.7"/>
    <line x1="-78" y1="-45" x2="78" y2="45" opacity="0.7"/>
    <line x1="-78" y1="45" x2="78" y2="-45" opacity="0.7"/>
  </g>
  <!-- 中文标识 -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="72" fill="white" opacity="0.95" letter-spacing="8">中文</text>
</svg>
